<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Remote Shell</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Android Remote Shell</h1>
            <div class="status">
                <span id="connectionStatus">Disconnected</span>
            </div>
        </div>
        
        <div class="devices-panel">
            <h3>Connected Devices</h3>
            <div id="deviceList">No devices connected</div>
        </div>
        
        <div class="terminal-container">
            <div class="terminal-header">
                <h3>Terminal</h3>
                <button onclick="clearTerminal()">Clear</button>
            </div>
            <div id="terminal" class="terminal"></div>
            <div class="input-container">
                <span class="prompt">$</span>
                <input type="text" id="commandInput" placeholder="Enter command..." onkeypress="handleKeyPress(event)">
                <button onclick="executeCommand()">Execute</button>
            </div>
        </div>
        
        <div class="quick-actions">
            <button onclick="executeCommand('screenshot')" class="action-btn">
                📸 Take Screenshot
            </button>
            <button onclick="executeCommand('device_info')" class="action-btn">
                📱 Device Info
            </button>
            <button onclick="executeCommand('ping')" class="action-btn">
                🏓 Ping
            </button>
        </div>
        
        <div id="screenshotContainer" class="screenshot-container" style="display: none;">
            <h3>Screenshot</h3>
            <img id="screenshotImage" src="" alt="Screenshot">
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
